name: Build Complete Portfolio Repository

on:
  push:
    branches: [main]
    paths:
      - "tools/build_repository.py.gz.b64.part*"
      - ".github/workflows/build-repository.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn catboost matplotlib joblib python-pptx nbformat pytest

      - name: Reconstruct tested repository generator
        run: |
          cat tools/build_repository.py.gz.b64.part* | base64 --decode | gzip --decompress > /tmp/build_repository.py
          python -m py_compile /tmp/build_repository.py

      - name: Generate complete portfolio repository
        env:
          PROJECT_ROOT: ${{ runner.temp }}/generated
        run: python /tmp/build_repository.py

      - name: Copy generated project into repository
        run: |
          rsync -a "${{ runner.temp }}/generated/" ./
          rm -f tools/build_repository.py.gz.b64.part*
          rmdir tools 2>/dev/null || true

      - name: Validate generated project
        run: |
          python -m compileall -q src app run_pipeline.py
          pytest -q
          test -f README.md
          test -f app/app.py
          test -f presentation/Healthcare_Patient_Dataset_Executive_Presentation.pptx
          test -f models/baseline_logistic_regression.joblib
          test -f models/advanced_catboost.cbm

      - name: Commit completed repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build complete healthcare analytics portfolio project" || exit 0
          git push
